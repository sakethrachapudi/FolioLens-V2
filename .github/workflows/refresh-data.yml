name: Refresh Portfolio Data

on:
  schedule:
    - cron: '20 3,5,10,12,14,18,21 * * *'   # 3:20am, 5:20am, 10:20am, 12:20pm, 2:20pm, 6:20pm, 9:20pm IST
      timezone: 'Asia/Kolkata'
    - cron: '50 7 * * *'                    # 7:50am IST
      timezone: 'Asia/Kolkata'
  workflow_dispatch: {}      # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Run ETL
        run: python etl/build_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "foliolens-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-refresh portfolio data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
