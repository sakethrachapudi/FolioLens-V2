name: Refresh Portfolio Data

on:
  schedule:
    # Times below are UTC (GitHub Actions' most reliable, battle-tested cron format).
    # IST equivalents: 21:50/23:50 UTC = 3:20am/5:20am IST (next day);
    # 02:20 UTC = 7:50am IST; 04:50 UTC = 10:20am IST; 06:50 UTC = 12:20pm IST;
    # 08:50 UTC = 2:20pm IST; 12:50 UTC = 6:20pm IST; 15:50 UTC = 9:20pm IST.
    - cron: '50 21,23 * * *'
    - cron: '20 2 * * *'
    - cron: '50 4,6,8,12,15 * * *'
  workflow_dispatch: {}      # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Run ETL
        run: python etl/build_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "foliolens-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-refresh portfolio data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
